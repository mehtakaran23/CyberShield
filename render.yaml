services:
  - type: web
    name: cybershield-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: GCP_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: VERTEX_SERVICE_ACCOUNT
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: VERTEX_MODEL
        sync: false
      - key: VERTEX_MODEL_FALLBACKS
        sync: false
      - key: GCP_LOCATION
        sync: false

  - type: static_site
    name: cybershield-dashboard
    rootDir: dashboard
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        sync: false