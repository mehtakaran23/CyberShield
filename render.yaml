services:
  - type: web
    name: cybershield-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: GCP_PROJECT_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: VERTEX_MODEL
        sync: false
      - key: VERTEX_MODEL_FALLBACKS
        sync: false
      - key: GCP_LOCATION
        sync: false

  - type: web
    name: cybershield-dashboard
    env: node
    rootDir: dashboard
    buildCommand: npm install && npm run build
    startCommand: npm run preview
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        sync: false